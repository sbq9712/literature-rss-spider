name: Monthly Literature Statistics

on:
  workflow_run:
    workflows: ["Weekly CSV to XLSX+Word (Gemini)"]
    types: [completed]
  schedule:
    # Fallback: every Friday 13:30 Asia/Shanghai (05:30 UTC). The job gate keeps
    # only the last Friday of the month; workflow_run above preserves ordering.
    - cron: "30 5 * * 5"
  workflow_dispatch:
    inputs:
      month:
        description: "Target month in YYYY-MM. Leave empty to use previous month."
        required: false
        default: ""

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: monthly-literature-stats
  cancel-in-progress: false

jobs:
  generate-monthly-stats:
    runs-on: ubuntu-latest
    steps:
      - name: Decide whether to run monthly statistics
        id: monthly_gate
        shell: bash
        run: |
          set -e

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            echo "month=${{ github.event.inputs.month }}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "${{ github.event_name }}" = "workflow_run" ] && [ "${{ github.event.workflow_run.conclusion }}" != "success" ]; then
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "Upstream weekly workflow did not succeed."
            exit 0
          fi

          # In Asia/Shanghai, this workflow is evaluated on Friday after weekly output.
          next_week_month="$(TZ=Asia/Shanghai date -d '+7 days' +'%m')"
          this_month="$(TZ=Asia/Shanghai date +'%m')"
          if [ "$next_week_month" != "$this_month" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            echo "month=$(TZ=Asia/Shanghai date +'%Y-%m')" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout repo
        if: steps.monthly_gate.outputs.run == 'true'
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ github.token }}
          persist-credentials: true

      - name: Refresh latest main
        if: steps.monthly_gate.outputs.run == 'true'
        run: |
          git fetch origin main
          git pull --rebase origin main

      - name: Set up Python
        if: steps.monthly_gate.outputs.run == 'true'
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install deps
        if: steps.monthly_gate.outputs.run == 'true'
        run: |
          python -m pip install -U pip
          pip install -r requirements.txt

      - name: Generate monthly literature statistics
        if: steps.monthly_gate.outputs.run == 'true'
        shell: bash
        run: |
          set -e
          if [ -n "${{ steps.monthly_gate.outputs.month }}" ]; then
            python monthly_literature_stats.py --month "${{ steps.monthly_gate.outputs.month }}"
          else
            python monthly_literature_stats.py
          fi

      - name: Commit monthly workbook
        if: steps.monthly_gate.outputs.run == 'true'
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -e
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

          git add output/monthly/*.xlsx || true
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "chore: monthly literature statistics (UTC $(date -u +'%Y-%m-%d'))"
          git fetch origin main
          git pull --rebase origin main
          git push origin HEAD:main
