name: Weekly CSV to Word (DOCX)

on:
  workflow_dispatch: {}

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: rss-to-word
  cancel-in-progress: false

jobs:
  csv-to-word:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ github.token }}
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      # Cache model files so next run won't re-download Marian
      - name: Cache HuggingFace models
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/huggingface
            ~/.cache/torch
          key: hf-cache-${{ runner.os }}-v1

      - name: Install deps
        run: |
          python -m pip install -U pip
          pip install -r requirements.txt

      - name: Convert latest weekly CSV to translated CSV + bilingual Word
        run: |
          python best_csv_to_word.py

      - name: Commit outputs (rebase-safe)
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -e
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

          # commit both translated CSV and DOCX
          git add output/weekly/*.docx output/weekly/*.csv || true
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "chore: weekly translated csv+docx (UTC $(date -u +'%Y-%m-%d'))"
          git fetch origin main
          git pull --rebase origin main
          git push origin HEAD:main
