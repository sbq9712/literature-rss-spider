name: RSS Spider + Weekly Aggregate with Abstracts

on:
  schedule:
    # Daily spider: 10:00 Asia/Shanghai, 02:00 UTC.
    - cron: "0 2 * * *"
    # Weekly aggregate: Friday 10:50 Asia/Shanghai, 02:50 UTC.
    - cron: "50 2 * * 5"
  workflow_dispatch:
    inputs:
      task:
        description: "Task to run"
        required: true
        default: daily
        type: choice
        options:
          - daily
          - weekly
          - all

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: rss-spider-main
  cancel-in-progress: false

jobs:
  run-rss-spider:
    if: github.event.schedule == '0 2 * * *' || github.event.inputs.task == 'daily' || github.event.inputs.task == 'all'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ github.token }}
          persist-credentials: true

      - name: Print UTC time
        run: date -u

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install -U pip
          pip install -r requirements.txt

      - name: Install Playwright browsers (Chromium)
        run: python -m playwright install --with-deps chromium

      - name: Run spider (headless)
        run: python spider0301.py
        env:
          PLAYWRIGHT_HEADLESS: "1"

      - name: Commit daily results (rebase-safe)
        env:
          GITHUB_TOKEN: ${{ github.token }}
          DISPATCH_TOKEN: ${{ secrets.TECH_DB_DISPATCH_TOKEN }}
        run: |
          set -e
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${GITH...git"

          git add output/*.csv || true
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "chore: daily RSS results (UTC $(date -u +'%Y-%m-%d'))"
          git fetch origin main
          git pull --rebase origin main
          git push origin HEAD:main

          # 通知 tech-db 重建：新文献数据已推送
          curl -sf -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: token ${DISPATCH_TOKEN}" \
            https://api.github.com/repos/sbq9712/tech-db/dispatches \
            -d '{"event_type":"literature-updated","client_payload":{"source":"literature-rss-spider","job":"daily"}}' \
            || echo "WARN: tech-db dispatch failed (non-fatal)"

  run-weekly-aggregate-with-abs:
    needs: run-rss-spider
    if: always() && (github.event_name == 'schedule' || github.event.inputs.task == 'weekly' || github.event.inputs.task == 'all')
    runs-on: ubuntu-latest
    steps:
      - name: Decide whether to run weekly aggregate
        id: weekly_gate
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          elif [ "$(date -u +%u)" = "5" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout repo
        if: steps.weekly_gate.outputs.run == 'true'
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ github.token }}
          persist-credentials: true

      - name: Print UTC time
        if: steps.weekly_gate.outputs.run == 'true'
        run: date -u

      - name: Refresh latest main before weekly aggregate
        if: steps.weekly_gate.outputs.run == 'true'
        run: |
          git fetch origin main
          git pull --rebase origin main

      - name: Set up Python
        if: steps.weekly_gate.outputs.run == 'true'
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        if: steps.weekly_gate.outputs.run == 'true'
        run: |
          python -m pip install -U pip
          pip install -r requirements.txt

      - name: Install Playwright browsers (Chromium)
        if: steps.weekly_gate.outputs.run == 'true'
        run: python -m playwright install --with-deps chromium

      - name: Weekly aggregate with abstracts (UTC)
        if: steps.weekly_gate.outputs.run == 'true'
        run: python weekly_aggrerate_with_abs.py
        env:
          PLAYWRIGHT_HEADLESS: "1"

      - name: Commit weekly results (rebase-safe)
        if: steps.weekly_gate.outputs.run == 'true'
        env:
          GITHUB_TOKEN: ${{ github.token }}
          DISPATCH_TOKEN: ${{ secrets.TECH_DB_DISPATCH_TOKEN }}
        run: |
          set -e
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${GITH...git"

          git add output/weekly/*.csv || true
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "chore: weekly RSS aggregate with abstracts (UTC $(date -u +'%Y-%m-%d'))"
          git fetch origin main
          git pull --rebase origin main
          git push origin HEAD:main

          # 通知 tech-db 重建：周报数据已推送
          curl -sf -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: token ${DISPATCH_TOKEN}" \
            https://api.github.com/repos/sbq9712/tech-db/dispatches \
            -d '{"event_type":"literature-updated","client_payload":{"source":"literature-rss-spider","job":"weekly"}}' \
            || echo "WARN: tech-db dispatch failed (non-fatal)"
