name: RSS Spider (legacy)

on:
  workflow_dispatch:
    inputs:
      task:
        description: "Legacy task to run"
        required: true
        default: daily
        type: choice
        options:
          - daily
          - weekly
          - all

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: rss-spider-main
  cancel-in-progress: false

jobs:
  run-rss-spider:
    if: github.event.inputs.task == 'daily' || github.event.inputs.task == 'all'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ github.token }}
          persist-credentials: true

      - name: Print UTC time
        run: date -u

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run legacy spider for UTC yesterday
        run: python spider_2days_1031.py

      - name: Commit daily results (rebase-safe)
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -e
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

          git add output/*.csv || true
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "chore: legacy daily RSS results (UTC $(date -u +'%Y-%m-%d'))"
          git fetch origin main
          git pull --rebase origin main
          git push origin HEAD:main

  run-weekly-aggregate:
    if: github.event.inputs.task == 'weekly' || github.event.inputs.task == 'all'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ github.token }}
          persist-credentials: true

      - name: Print UTC time
        run: date -u

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Aggregate last week (UTC)
        run: python weekly_aggregate.py

      - name: Commit weekly results (rebase-safe)
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -e
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

          git add output/weekly/*.csv || true
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "chore: legacy weekly RSS aggregate (UTC $(date -u +'%Y-%m-%d'))"
          git fetch origin main
          git pull --rebase origin main
          git push origin HEAD:main
