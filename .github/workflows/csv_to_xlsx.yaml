name: Weekly CSV to XLSX+Word (Gemini)

on:
  schedule:
    - cron: "40 3 * * 5"
  workflow_dispatch: {}

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: rss-to-word
  cancel-in-progress: false

jobs:
  classify-to-xlsx-docx:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ github.token }}
          persist-credentials: true

      - name: Detect untranslated weekly CSV
        id: weekly_input
        shell: bash
        run: |
          latest="$(find output/weekly -maxdepth 1 -type f -name 'weekly_news_with_abstract_*.csv' ! -name '*_translated.csv' | sort | tail -n 1)"
          if [ -z "$latest" ]; then
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "No weekly_news_with_abstract_*.csv found."
            exit 0
          fi

          stem="${latest%.csv}"
          xlsx="${stem}_translated.xlsx"
          docx="${stem}_translated.docx"

          echo "input=$latest" >> "$GITHUB_OUTPUT"
          if [ -f "$xlsx" ] && [ -f "$docx" ]; then
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "Latest weekly CSV is already translated: $latest"
          else
            echo "run=true" >> "$GITHUB_OUTPUT"
            echo "Will translate/classify: $latest"
          fi

      - name: Set up Python
        if: steps.weekly_input.outputs.run == 'true'
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      # Cache HuggingFace + torch to avoid re-downloading embedding model
      - name: Cache HuggingFace models
        if: steps.weekly_input.outputs.run == 'true'
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/huggingface
            ~/.cache/torch
          key: hf-cache-${{ runner.os }}-v2

      - name: Install deps
        if: steps.weekly_input.outputs.run == 'true'
        run: |
          python -m pip install -U pip
          pip install -r requirements.txt

      - name: Run classify_weekly_onefile.py
        if: steps.weekly_input.outputs.run == 'true'
        env:
          GOOGLE_AI_API_KEY: ${{ secrets.GOOGLE_AI_API_KEY }}
          GOOGLE_AI_MAX_RETRIES: "3"
          GEMINI_CLASSIFY_MAX_RETRIES: "2"
          GOOGLE_AI_RETRY_BASE_SECONDS: "4"
          GOOGLE_AI_RETRY_MAX_SECONDS: "30"
        run: |
          python3 classify_weekly_onefile.py -i "${{ steps.weekly_input.outputs.input }}" -c classification.txt --translation-provider google --classification-model gemini-2.5-flash --output-suffix _translated --save-translated-csv

      - name: Commit outputs (only translated files)
        if: always() && steps.weekly_input.outputs.run == 'true'
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -e

          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

          # 只添加本次 translated 文件
          git add output/checkpoints/* || true
          git add output/weekly/*_translated.csv || true
          git add output/weekly/*_translated.xlsx || true
          git add output/weekly/*_translated.docx || true

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "chore: weekly translated xlsx+docx (UTC $(date -u +'%Y-%m-%d'))"

          git fetch origin main
          git pull --rebase origin main

          git push origin HEAD:main
